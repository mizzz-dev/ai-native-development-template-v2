name: docs

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  docs-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: '**/*.md'
      - name: Link check
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --verbose './**/*.md'
      - name: Docs structure check
        run: |
          test -d docs/core
          test -d docs/integrations
          test -d docs/stacks
          test -d docs/templates
