name: docs

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  docs-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: |
            **/*.md
            !docs/examples/*.md
      - name: Link and docs validation
        run: bash scripts/validate-docs.sh
      - name: Docs structure check
        run: |
          test -d docs/core
          test -d docs/integrations
          test -d docs/stacks
          test -d docs/templates
