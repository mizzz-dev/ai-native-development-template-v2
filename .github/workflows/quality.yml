name: quality
on:
  pull_request:
  push:
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm install
      - run: npm run build:create-ai-native-dev
      - run: npm test
      - run: bash scripts/validate-docs.sh
      - run: bash scripts/check-secrets.sh
